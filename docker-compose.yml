
services:

  redis:

    image: redis

    container_name: python_sensei_redis

    ports:
      - "6379:6379"

  fastapi:

    build: .

    container_name: python_sensei_fastapi

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

    ports:
      - "8000:8000"

    depends_on:
      - redis

    volumes:
      - .:/app

  celery:

    build: .

    container_name: python_sensei_celery

    command: celery -A app.celery_worker.celery_app worker --pool=solo --loglevel=info

    depends_on:
      - redis

    volumes:
      - .:/app